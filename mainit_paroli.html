<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Mainīt paroli</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border-t-4 border-orange-500">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Paroles maiņa</h2>
        
        <form action="/mainit-paroli" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Pašreizējā parole</label>
                <input type="password" name="veca_parole" class="w-full p-2 border rounded outline-none focus:ring-2 focus:ring-orange-400" required>
            </div>
            <hr>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Jaunā parole</label>
                <input type="password" name="jauna_parole" class="w-full p-2 border rounded outline-none focus:ring-2 focus:ring-orange-400" required>
            </div>
            <div class="flex gap-2 pt-2">
                <a href="/" class="flex-1 text-center py-2 bg-gray-100 text-gray-600 rounded hover:bg-gray-200">Atcelt</a>
                <button type="submit" class="flex-1 py-2 bg-orange-500 text-white rounded font-bold hover:bg-orange-600">Saglabāt</button>
            </div>
        </form>
    </div>
</body>
</html>
