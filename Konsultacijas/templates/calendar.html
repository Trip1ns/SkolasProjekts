<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konsultāciju Kalendārs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        .header-top {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header-top a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .header-top a:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

<div class="header-top">
    <h2>📅 Konsultāciju kalendārs</h2>
    <a href="/dashboard">← Atpakaļ uz paneli</a>
</div>

<style>

    .calendar-container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
    }

    .calendar-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .calendar-header h1 {
        margin: 0;
        font-size: 28px;
    }

    .current-time {
        font-size: 14px;
        opacity: 0.9;
        margin-top: 5px;
    }

    .calendar-filters {
        display: flex;
        gap: 15px;
        margin-bottom: 25px;
        flex-wrap: wrap;
    }

    .filter-group {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .filter-group label {
        font-weight: 500;
        color: #333;
    }

    .filter-group select,
    .filter-group input {
        padding: 8px 12px;
        border: 2px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
        transition: border-color 0.3s;
    }

    .filter-group select:focus,
    .filter-group input:focus {
        outline: none;
        border-color: #667eea;
    }

    .slots-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .slot-card {
        background: white;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        padding: 20px;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        display: flex;
        flex-direction: column;
    }

    .slot-card:hover {
        border-color: #667eea;
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        transform: translateY(-2px);
    }

    .slot-card.closed {
        opacity: 0.6;
        background: #f5f5f5;
    }

    .slot-card.registered {
        border-color: #4caf50;
        background: #f1f8f4;
    }

    .slot-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 12px;
    }

    .slot-teacher {
        font-size: 18px;
        font-weight: 600;
        color: #333;
        flex: 1;
    }

    .slot-subject {
        font-size: 12px;
        color: #999;
        background: #f0f0f0;
        padding: 4px 8px;
        border-radius: 4px;
        margin-left: 8px;
    }

    .slot-status-badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        margin-bottom: 12px;
    }

    .slot-status-badge.open {
        background: #c8e6c9;
        color: #2e7d32;
    }

    .slot-status-badge.closed {
        background: #ffcdd2;
        color: #c62828;
    }

    .slot-status-badge.registered {
        background: #bbdefb;
        color: #1565c0;
    }

    .slot-details {
        font-size: 14px;
        line-height: 1.8;
        margin-bottom: 12px;
        color: #555;
    }

    .slot-detail-row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
    }

    .slot-detail-label {
        font-weight: 500;
        min-width: 80px;
        color: #333;
    }

    .slot-detail-value {
        color: #666;
        flex: 1;
        word-break: break-word;
    }

    .slot-detail-value.date {
        color: #667eea;
        font-weight: 500;
    }

    .slot-deadline {
        background: #fff3cd;
        border-left: 4px solid #ffc107;
        padding: 10px 12px;
        border-radius: 4px;
        font-size: 13px;
        margin-bottom: 12px;
        color: #856404;
    }

    .deadline-time {
        font-weight: 600;
        color: #cc0000;
    }

    .slot-capacity {
        background: #e3f2fd;
        padding: 10px 12px;
        border-radius: 4px;
        margin-bottom: 12px;
        font-size: 13px;
    }

    .capacity-bar {
        display: flex;
        height: 8px;
        background: #bbb;
        border-radius: 4px;
        overflow: hidden;
        margin-top: 6px;
    }

    .capacity-bar.full {
        background: #ff6b6b;
    }

    .capacity-used {
        background: #667eea;
        height: 100%;
    }

    .slot-actions {
        display: flex;
        gap: 10px;
        margin-top: auto;
    }

    .btn {
        flex: 1;
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        text-align: center;
    }

    .btn-primary {
        background: #667eea;
        color: white;
    }

    .btn-primary:hover:not(:disabled) {
        background: #5568d3;
        transform: translateY(-1px);
    }

    .btn-primary:disabled {
        background: #ccc;
        cursor: not-allowed;
        opacity: 0.6;
    }

    .btn-secondary {
        background: #e0e0e0;
        color: #333;
    }

    .btn-secondary:hover {
        background: #d0d0d0;
    }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #999;
    }

    .empty-state-icon {
        font-size: 60px;
        margin-bottom: 20px;
        opacity: 0.5;
    }

    .empty-state h2 {
        color: #666;
        margin-bottom: 10px;
    }

    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }

    .modal.active {
        display: flex;
    }

    .modal-content {
        background: white;
        padding: 30px;
        border-radius: 10px;
        max-width: 500px;
        width: 90%;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .modal-header {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 20px;
        color: #333;
    }

    .modal-body {
        margin-bottom: 20px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        font-weight: 500;
        margin-bottom: 6px;
        color: #333;
    }

    .form-group textarea,
    .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
        font-family: inherit;
    }

    .form-group textarea:focus,
    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .modal-footer {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
    }

    .modal-footer .btn {
        min-width: 100px;
    }

    .message {
        padding: 15px 20px;
        border-radius: 5px;
        margin-bottom: 20px;
        animation: slideIn 0.3s ease;
    }

    .message.success {
        background: #c8e6c9;
        color: #2e7d32;
        border-left: 4px solid #4caf50;
    }

    .message.error {
        background: #ffcdd2;
        color: #c62828;
        border-left: 4px solid #f44336;
    }

    @keyframes slideIn {
        from {
            transform: translateY(-20px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    @media (max-width: 768px) {
        .slots-grid {
            grid-template-columns: 1fr;
        }

        .calendar-filters {
            flex-direction: column;
        }

        .calendar-header {
            flex-direction: column;
            text-align: center;
        }
    }

    .no-slots {
        grid-column: 1 / -1;
        text-align: center;
        padding: 40px 20px;
        color: #999;
    }
</style>

<div class="calendar-container">
    <div class="calendar-header">
        <div>
            <h1>📅 Konsultācijas</h1>
            <div class="current-time" id="currentTime"></div>
        </div>
    </div>

    <div id="messageContainer"></div>

    <div class="calendar-filters">
        <div class="filter-group">
            <label>Skolotājs:</label>
            <select id="teacherFilter">
                <option value="">Visi skolotāji</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Stāvoklis:</label>
            <select id="statusFilter">
                <option value="">Viss</option>
                <option value="open">Atvērts</option>
                <option value="closed">Slēgts</option>
                <option value="registered">Pieteicies</option>
            </select>
        </div>
    </div>

    <div class="slots-grid" id="slotsContainer">
        <div class="no-slots">Ielāde...</div>
    </div>
</div>

<!-- Pieteikšanās modāls -->
<div class="modal" id="registrationModal">
    <div class="modal-content">
        <div class="modal-header">Pieteikties konsultācijai</div>
        <div class="modal-body">
            <div id="slotInfo"></div>
            <div class="form-group">
                <label>Iemesls (obligāts):</label>
                <textarea id="reason" placeholder="Iemesls" required></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">Atcelt</button>
            <button class="btn btn-primary" onclick="submitRegistration()">Pieteikties</button>
        </div>
    </div>
</div>

<script>
    let allSlots = [];
    let selectedSlotId = null;

    // Update current time every second
    function updateTime() {
        const now = new Date();
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = now.getFullYear();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('currentTime').textContent = `${day}-${month}-${year} ${hours}:${minutes}`;
    }

    // Load slots from API
    async function loadSlots() {
        try {
            const response = await fetch('/api/calendar/available');
            const slots = await response.json();
            allSlots = slots;
            
            // Load teachers for filter
            const teacherResponse = await fetch('/api/teachers');
            const teachers = await teacherResponse.json();
            populateTeacherFilter(teachers);
            
            renderSlots();
        } catch (error) {
            showMessage('Kļūda ielādējot konsultācijas: ' + error.message, 'error');
        }
    }

    function populateTeacherFilter(teachers) {
        const select = document.getElementById('teacherFilter');
        teachers.forEach(teacher => {
            const option = document.createElement('option');
            option.value = teacher.id;
            option.textContent = teacher.name;
            select.appendChild(option);
        });
    }

    function renderSlots() {
        const container = document.getElementById('slotsContainer');
        const teacherFilter = document.getElementById('teacherFilter').value;
        const statusFilter = document.getElementById('statusFilter').value;

        let filtered = allSlots;

        if (teacherFilter) {
            filtered = filtered.filter(s => s.teacher_id == teacherFilter);
        }

        if (statusFilter === 'open') {
            filtered = filtered.filter(s => s.registration_open && !s.is_requested);
        } else if (statusFilter === 'closed') {
            filtered = filtered.filter(s => !s.registration_open);
        } else if (statusFilter === 'registered') {
            filtered = filtered.filter(s => s.is_requested);
        }

        if (filtered.length === 0) {
            container.innerHTML = '<div class="no-slots">Nav pieejamu konsultāciju ar atlasītajiem kritērijiem</div>';
            return;
        }

        container.innerHTML = filtered.map(slot => renderSlotCard(slot)).join('');
    }

    function renderSlotCard(slot) {
        const statusClass = slot.is_requested ? 'registered' : (slot.registration_open ? 'open' : 'closed');
        const statusText = slot.is_requested ? 'Pieteicies' : (slot.registration_open ? 'Atvērts' : 'Slēgts');
        
        // Ensure capacity object exists with default values
        const capacity = slot.capacity || { total: 10, registered: 0, available: 10 };
        const capacityPercent = (capacity.registered / capacity.total) * 100;
        const capacityFull = capacityPercent >= 100;

        let deadlineHtml = '';
        if (slot.registration_open && slot.time_until_deadline) {
            const timeInfo = slot.time_until_deadline;
            deadlineHtml = `
                <div class="slot-deadline">
                    ⏱️ Reģistrācijas termiņš: <span class="deadline-time">${timeInfo.formatted}</span>
                </div>
            `;
        }

        return `
            <div class="slot-card ${statusClass}">
                <div class="slot-header">
                    <div class="slot-teacher">${slot.teacher_name}</div>
                    ${slot.teacher_subject ? `<span class="slot-subject">${slot.teacher_subject}</span>` : ''}
                </div>
                <div class="slot-status-badge ${statusClass === 'registered' ? 'registered' : (slot.registration_open ? 'open' : 'closed')}">
                    ${statusText}
                </div>
                <div class="slot-details">
                    <div class="slot-detail-row">
                        <span class="slot-detail-label">📅 Datums:</span>
                        <span class="slot-detail-value date">${slot.occurrence_date_lv}</span>
                    </div>
                    <div class="slot-detail-row">
                        <span class="slot-detail-label">⏰ Laiks:</span>
                        <span class="slot-detail-value">${slot.time}</span>
                    </div>
                    <div class="slot-detail-row">
                        <span class="slot-detail-label">📍 Kabinets:</span>
                        <span class="slot-detail-value">${slot.room}</span>
                    </div>
                </div>
                ${deadlineHtml}
                <div class="slot-capacity">
                    <div>Vietu pieejamība: <strong>${capacity.available}/${capacity.total}</strong></div>
                    <div class="capacity-bar ${capacityFull ? 'full' : ''}">
                        <div class="capacity-used" style="width: ${capacityPercent}%"></div>
                    </div>
                </div>
                ${slot.close_reason ? `<div style="color: #d32f2f; font-size: 12px; margin-top: 8px;">❌ ${slot.close_reason}</div>` : ''}
                <div class="slot-actions">
                    ${slot.is_requested 
                        ? `<button class="btn btn-secondary" disabled>✓ Jau pieteicies</button>` 
                        : `<button class="btn btn-primary ${!slot.registration_open || capacity.available === 0 ? 'disabled' : ''}" 
                                onclick="openRegistrationModal(${slot.id})" 
                                ${!slot.registration_open || capacity.available === 0 ? 'disabled' : ''}>
                            Pieteikties
                          </button>`
                    }
                </div>
            </div>
        `;
    }

    function openRegistrationModal(slotId) {
        selectedSlotId = slotId;
        const slot = allSlots.find(s => s.id === slotId);
        
        if (slot) {
            const slotInfo = `
                <div style="background: #f5f5f5; padding: 12px; border-radius: 5px; margin-bottom: 15px;">
                    <div><strong>${slot.teacher_name}</strong></div>
                    <div style="color: #666; font-size: 14px;">📅 ${slot.occurrence_date_lv}</div>
                    <div style="color: #666; font-size: 14px;">📍 ${slot.room}</div>
                </div>
            `;
            document.getElementById('slotInfo').innerHTML = slotInfo;
        }
        
        document.getElementById('reason').value = '';
        document.getElementById('registrationModal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('registrationModal').classList.remove('active');
        selectedSlotId = null;
    }

    async function submitRegistration() {
        const reason = document.getElementById('reason').value.trim();
        
        if (!reason) {
            showMessage('Pierakstiet iemeslu, kāpēc vēlaties pieteikties', 'error');
            return;
        }

        if (!selectedSlotId) {
            showMessage('Kļūda: slots nav atlasīts', 'error');
            return;
        }

        try {
            const slot = allSlots.find(s => s.id === selectedSlotId);
            const response = await fetch('/api/request', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    slot_id: selectedSlotId,
                    teacher_id: slot.teacher_id,
                    reason: reason
                })
            });

            const result = await response.json();

            if (response.ok) {
                showMessage('✓ Jūs veiksmīgi pieteicies konsultācijai!', 'success');
                closeModal();
                loadSlots();
            } else {
                showMessage('Kļūda: ' + result.error, 'error');
            }
        } catch (error) {
            showMessage('Kļūda sūtot pieteikumu: ' + error.message, 'error');
        }
    }

    function showMessage(text, type) {
        const container = document.getElementById('messageContainer');
        const messageEl = document.createElement('div');
        messageEl.className = `message ${type}`;
        messageEl.textContent = text;
        container.innerHTML = '';
        container.appendChild(messageEl);
        
        setTimeout(() => {
            messageEl.remove();
        }, 5000);
    }

   
    document.getElementById('teacherFilter').addEventListener('change', renderSlots);
    document.getElementById('statusFilter').addEventListener('change', renderSlots);

   
    updateTime();
    setInterval(updateTime, 1000);
    loadSlots();
    setInterval(loadSlots, 10000); 
</script>

</body>
</html>
