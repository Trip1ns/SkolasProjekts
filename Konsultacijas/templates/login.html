<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>R6VSK Konsultācijas</title>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#4F46E5",
            "background-light": "#F3F7FA",
            "background-dark": "#0F172A",
          },
          fontFamily: {
            display: ["Inter", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "0.75rem",
          },
        },
      },
    };
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4 transition-colors duration-200">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-primary text-white rounded-2xl shadow-lg mb-4">
        <span class="material-icons text-4xl">school</span>
      </div>
      <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Pieteikšanās</h1>
      <p class="text-slate-500 dark:text-slate-400">Laipni lūdzam R6VSK konsultāciju portālā!</p>
    </div>

    <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700">

      {% if error %}
        <div class="mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
          {{ error }}
        </div>
      {% endif %}

      <!-- SVARĪGI: method="post" un pareizie name= -->
      <form method="post" class="space-y-6">

        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2" for="name">Vārds</label>
          <div class="relative">
            <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
            <input
              class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:text-white placeholder:text-slate-400 outline-none transition-all"
              id="name"
              name="name"
              placeholder="Ievadiet savu vārdu"
              type="text"
              required
            />
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2" for="password">Parole</label>
          <div class="relative">
            <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
            <input
              class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:text-white placeholder:text-slate-400 outline-none transition-all"
              id="password"
              name="password"
              placeholder="Ievadiet paroli"
              type="password"
              required
            />
          </div>

          <div class="mt-2 flex items-start gap-2">
            <span class="material-icons text-amber-500 text-sm mt-0.5">info</span>
            <p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">
              Parolei jābūt vismaz 8 simboliem, ar lielo burtu, ciparu un speciālo simbolu.
            </p>
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2" for="role">Loma</label>
          <div class="relative">
            <span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">category</span>
            <select
              class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:text-white appearance-none outline-none transition-all"
              id="role"
              name="role"
              required
            >
              <option value="student">Skolēns</option>
              <option value="teacher">Skolotājs</option>
              <option value="admin">Administrators</option>
            </select>
            <span class="material-icons absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
          </div>
        </div>

        <div class="pt-2">
          <button class="w-full py-4 bg-primary hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 dark:shadow-none transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
            <span>Ielogoties</span>
            <span class="material-icons text-lg">login</span>
          </button>
        </div>

      </form>
      <div class="mt-3 text-center">
        <a href="/forgot" class="text-sm text-primary">Aizmirsāt paroli?</a>
      </div>
    </div>

    <div class="mt-8 flex flex-col items-center gap-4">
      <button class="p-2 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:text-primary transition-colors"
              onclick="document.documentElement.classList.toggle('dark')" type="button">
        <span class="material-icons dark:hidden">dark_mode</span>
        <span class="material-icons hidden dark:block">light_mode</span>
      </button>
      
    </div>

  </div>
</body>
</html>
